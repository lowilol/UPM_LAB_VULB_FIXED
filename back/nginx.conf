# F-13: Mapa para gestión segura de WebSocket (evita H2C Smuggling)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # Reenvía /api/* al backend (sin WebSocket — limpiar cabeceras Upgrade)
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # F-13: Backend no usa WebSocket; anular cabeceras de upgrade
        proxy_set_header Upgrade '';
        proxy_set_header Connection close;
    }

    # Todo lo demás al frontend (Vite preview sí usa WebSocket para HMR)
    location / {
        proxy_pass http://frontend:4173;
        proxy_http_version 1.1;
        # F-13: Usar mapa para reenviar Upgrade solo cuando proceda
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
}
