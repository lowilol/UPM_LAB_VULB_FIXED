# F-13: Mapa para gestión segura de WebSocket (evita H2C Smuggling)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Redirección de todo el tráfico HTTP a HTTPS
server {
    listen 80;
    server_name upmlab.es *.upmlab.es;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name upmlab.es *.upmlab.es;

    ssl_certificate     /etc/nginx/certs/upmlab.es.crt;
    ssl_certificate_key /etc/nginx/certs/upmlab.es.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=30s;
    set $backend  http://backend:4000;
    set $frontend http://frontend:4173;

    location /api/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        # F-13: Backend no usa WebSocket; anular cabeceras de upgrade
        proxy_set_header Upgrade '';
        proxy_set_header Connection close;
    }

    location / {
        proxy_pass $frontend;
        proxy_http_version 1.1;
        # F-13: Usar mapa para reenviar Upgrade solo cuando proceda
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
