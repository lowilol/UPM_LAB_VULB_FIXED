services:

  mysql:
    image: mysql:8.0
    container_name: tfg_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tfg_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tfg_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - tfg_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: tfg_backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tfg_network

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: tfg_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - tfg_network
  dns:
    image: 4km3/dnsmasq:2.90-r3
    container_name: tfg_dns
    restart: always
    command:
      - --address=/upmlab.es/${HOST_LAN_IP}
      - --no-resolv
      - --server=8.8.8.8
      - --server=1.1.1.1
      - --log-queries
      - --listen-address=0.0.0.0
      - --bind-interfaces
      - --conf-file=/dev/null
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    cap_add:
      - NET_ADMIN
    networks:
      - tfg_network
  nginx:
    image: nginx:alpine
    container_name: tfg_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tfg_network

networks:
  tfg_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
